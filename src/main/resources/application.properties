spring.application.name=interview-ai-backend
server.port=${PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

jwt.secret=${JWT_SECRET}
jwt.expiration=604800000

google.client.id=${GOOGLE_CLIENT_ID:placeholder}

groq.api.key=${GROQ_API_KEY:placeholder}
groq.api.url=https://api.groq.com/openai/v1/chat/completions
groq.model=llama-3.3-70b-versatile
groq.max.tokens=500

nvidia.api.key=${NVIDIA_API_KEY:placeholder}
nvidia.api.url=https://integrate.api.nvidia.com/v1/chat/completions
nvidia.model=meta/llama-3.1-70b-instruct

razorpay.key.id=${RAZORPAY_KEY_ID:placeholder}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:placeholder}

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
