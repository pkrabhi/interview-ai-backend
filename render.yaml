# Render Blueprint — https://render.com/docs/blueprint-spec
# Import this repo on Render as a "Blueprint" to create the service with these settings
# pre-filled. Secrets (sync: false) are NOT stored here — you'll be prompted to paste each
# one into the Render dashboard after the blueprint is applied.
services:
  - type: web
    name: interview-ai-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: NVIDIA_API_KEY
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
